name: Discord Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: bot-run
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot with timed restart
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          START=$(date +%s)
          LIMIT=$((5*60*60 + 50*60))  # 5h 50m

          while true; do
            python bot.py &
            BOT_PID=$!

            while kill -0 $BOT_PID 2>/dev/null; do
              NOW=$(date +%s)
              ELAPSED=$((NOW - START))

              if [ $ELAPSED -ge $LIMIT ]; then
                echo "Stopping bot for restart..."
                kill $BOT_PID
                wait $BOT_PID 2>/dev/null
                break
              fi

              sleep 10
            done

            break
          done

      - name: Trigger next run
        if: always()
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}.yml/dispatches \
          -d '{"ref":"main"}'
